<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
</head>
<body>

<h1>My Orders</h1>

<a href="/">Home</a> |
<a href="/profile/">Profile</a>

<hr>

{% if orders %}

<table border="1" cellpadding="10">
    <tr>
        <th>Order ID</th>
        <th>Total Amount</th>
        <th>Status</th>
        <th>Date</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>₹{{ order.total_amount }}</td>
        <td>{{ order.status }}</td>
        <td>{{ order.created_at }}</td>
    </tr>
    {% endfor %}

</table>

{% else %}

<h3>No Orders Found.</h3>

{% endif %}

</body>
</html>
