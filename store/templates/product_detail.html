<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        .navbar{
            background:#222;
            padding:15px;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-weight:bold;
        }

        .container{
            width:80%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            display:flex;
            gap:40px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        img{
            width:350px;
            height:350px;
            object-fit:cover;
            border-radius:10px;
        }

        .details{
            flex:1;
        }

        h1{
            margin-top:0;
        }

        h2{
            color:green;
        }

        .btn{
            display:inline-block;
            background:orange;
            color:white;
            padding:12px 25px;
            text-decoration:none;
            border-radius:6px;
            margin-top:20px;
            font-weight:bold;
        }

        .btn:hover{
            background:darkorange;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/register/">Register</a>
    <a href="/login/">Login</a>
    <a href="/cart/">Cart</a>
</div>

<div class="container">

    <div>
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
    </div>

    <div class="details">

        <h1>{{ product.name }}</h1>

        <p>{{ product.description }}</p>

        <h2>₹{{ product.price }}</h2>

        <a href="/add-to-cart/{{ product.id }}/" class="btn">
            🛒 Add to Cart
        </a>

        <br><br>

        <a href="/" class="btn">
            ⬅ Back to Home
        </a>

    </div>

</div>

</body>
</html>
