<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
</head>
<body>

<h1>My Orders</h1>

{% if orders %}

<table border="1" cellpadding="10">
<tr>
    <th>Order ID</th>
    <th>Total</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for order in orders %}
<tr>
    <td>{{ order.id }}</td>
    <td>₹{{ order.total_amount }}</td>
    <td>{{ order.status }}</td>
    <td>{{ order.created_at }}</td>
</tr>
{% endfor %}

</table>

{% else %}

<h2>No Orders Found</h2>

{% endif %}

<br>

<a href="/">Back to Home</a>

</body>
</html>
