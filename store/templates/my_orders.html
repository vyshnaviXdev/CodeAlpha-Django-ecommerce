<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .container{
            width:80%;
            margin:auto;
            padding:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            padding:15px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#222;
            color:white;
        }
    </style>
</head>
<body>

<div class="container">

<h2>My Orders</h2>

<table>

<tr>
    <th>Order ID</th>
    <th>Total Amount</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for order in orders %}

<tr>
    <td>{{ order.id }}</td>
    <td>₹{{ order.total_amount }}</td>
    <td>{{ order.status }}</td>
    <td>{{ order.created_at }}</td>
</tr>

{% empty %}

<tr>
    <td colspan="4">No Orders Yet</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
